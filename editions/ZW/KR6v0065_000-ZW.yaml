body:
  text: 銷釋金剛經科儀整理者侯沖題解銷釋金剛經科儀又名金剛科儀中國佛教典籍宋釋宗鏡述一卷明代至今雲南阿吒力僧常用科儀本科儀主要以姚秦鳩摩羅什譯金剛般若波羅蜜經為依據編集而成必須與坊間刻本金剛經卷首為奉請八金剛四菩薩配合纔能舉行法會是研究中國佛教科儀的重要資料本科儀不見於我國古代經錄也未為我國歷代大藏經所收日本續藏經收有清道光年間抄本銷釋金剛經科儀和明嘉靖三十年覺連重集銷釋金剛經科儀會要註解但都未經校勘本科儀一向被納入寶卷的研究範圍未見從佛教科儀的角度來探討本科儀至今仍為雲南阿吒力僧最常用科儀將其整理出來無疑可以為研究寶卷與佛教科儀的關係開拓新的思路也可以為研究其成書年代提供新的線索還可以深化雲南阿吒力教的研究整理本的底校本情況如下底本雲南省劍川縣阿吒力張宗義先生藏古抄本甲本續藏經第壹輯第九十二套第二冊銷釋金剛經科儀會要註解乙本續藏經第壹輯第貳編乙第二套第二冊銷釋金剛經科儀丙本雲南省劍川縣阿吒力趙沛霖先生藏清光緒十二年抄本甲本與諸本有異字但註解引文不異者不另出校記天津圖書館藏有本科儀明刻本雲南省劍川縣民間也還有不少古抄本因條件限制此次未能參校錄文
