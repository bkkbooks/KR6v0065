心頭人我似干戈其心若不從頭改磕破髑髏當得麼世上愚人無智慧唯知愛慾及貪財何如一筆都鉤斷好念彌陀歸去來福智無比二法周圓塵沙結良緣功行累劫果滿因緣智燭普照一月當天圓明朗朗無心鑒大千般若真空性福慧兩雙修四句無為法持念片時周福智無比分第二十四入經福等三千施須彌之七寶經持四句耀智海之明珠能令識浪澄清頓使義天開朗弘慈普濟廣利無邊夜半正明還在何處三身四智體中圓八解六通心地印寶聚山王算莫窮還如仰箭射虛空洞明四句超三際絕勝僧祇萬倍功一毛頭上為拈花笑倒傍邊老作家要問相逢端的意摩尼達哩吽癹吒我憶彌陀如父母彌陀觀我似嬰孩心心念念常無間父子相隨歸去來化無所化機分小大空生莫疑猜四生六道去往還來迴光返照面目明白疑心頓歇紅霞遍九垓大乘深奧理解悟有多般實我實無我仔細好生觀化無所化分第二十五入經云云無我無人眾生自成正覺不生不滅如來說非凡夫雖然個事分明爭奈當機蹉過昔有僧問翠岩云還丹一粒點鐵成金至理一言轉凡成聖學人上來請師一點師云不點僧云為什麼不點師云恐汝落凡聖且道不落凡聖底人具什麼眼直饒聖解凡情盡開眼依前在夢中到岸從來不用船坦然大道透長安了知元不因他悟面目分明總一般前三三與後三三擬議商量總不堪饒汝識情俱絕斷三生九劫更重參白髮雙親齒漸衰勤供甘旨莫遲迴試學昔日能仁氏奉事尊堂歸去來法身非相不在心懷絕中間與內外聲色見我未出輪胎若離聲色難見如來徒勞遠覓文殊在五台有相即無相無相亦非真兩處俱不立一體是方親法身非相分第二十六入經妙相莊嚴聖王相即如來相法身周遍如來身異聖王身若向這裏見得徹去鷺倚雪巢兔棲月殿其或未然石火一揮天外去癡人猶看月邊星公案現成重審問愛情翻款錯承當不應聲色行邪道結罪無因見法王九年面壁自知非不若抽身隻履歸莫道少林消息斷白雲依舊擁柴扉三界忙忙何日省六塵擾擾幾時休西方一路超生死齊念彌陀到地頭無斷無滅自古長存不滅更不生山河成壞這個安寧無來無去耀古騰今人人本具鍮石不換金不生亦不滅無斷亦無常常樂並我淨非不好商量無斷無滅分第二十七入經相非具而本具常自莊嚴法雖傳而不傳何曾斷滅昔世尊於靈山會上人天眾前云吾有清淨法眼涅槃妙心付囑飲光廣令傳化且道當時傳個甚麼青蓮目顧人天眾金色頭陀獨破顏一燈能續百千燈心印光通法令行千聖不傳吹不滅聯輝列焰轉分明一點靈光塞太虛也非禪教也非儒打成一片誰人會具眼還他大丈夫天樂簫韶花雨飛他方遊歷聖初回如雲海眾相迎接目繫金容歸去來不受不貪知足常足無罪亦無福隨緣過日且忌分訴千家一鉢衲子活路雖無一物與眾生贈福不覺塵緣起貪愛轉見深若得迴光照當生即不生不受不貪分第二十八入經有求有苦八風五欲交煎無著無貪三明六通自在便恁麼去水邊林下月冷風清不恁麼去橋斷路窮別通消息還委悉麼老僧笑指猿啼處更有靈蹤在上方數行梵字雲中雁一曲無生澗底琴德勝河沙渾不用清風明月是知音春來秋去幾時休堪歎眾生又白頭東廓郊中多古墓北邙山下有骷髏白侍文章世間稀尚求兜率厭輪迴我今奉勸文章士念佛西方歸去來威儀寂靜塔丈心路不用巧分訴行住坐臥無盡無餘無所從來亦無所去若人會得全不費工夫人人具四大我見萬法空行住並坐臥來去與真同威儀寂靜分第二十九入經坐臥經行本自無來無去威儀不動寂然非靜非搖要解如來所說義否隨緣赴感靡不周而常處此菩提座巍巍不動法中王那有獼猴跳六窗笑指真空無面目連雲推月下千江蘆花影裏一骷髏半臥黃沙半土坵骷髏但有心頭氣爭名奪利幾時休漢末殘唐甚苦哉人心上下極相乖貪婪虛偽那堪說亂世如麻歸去來一合理相不在分別處處任宣說九年面壁斬釘截鐵神光三拜花開時節分明點破秤錘原是鐵三千界微塵俱來一念心如來一合相推倒大虛空一合理相分第三十入經以世界碎如微塵慈尊喻巧於玄要立權名談其實相凡夫意絕於貪求與麼會得返本還源背塵合覺不與麼會得智同諸佛悲合眾生總不與麼巨靈擡手無多子分破華山千萬重一段生涯六不收從前萬法盡非儔輕輕擘破三千界直得恒河水逆流九曲黃河直指君分明全不涉途程不知白日青天裏開眼許多迷路人東晉遠公曾結社遺民房翥總奇才淵明入會多耽飲今晚休杯歸去來知見不生返照還源本性離言詮見聞覺知無正無偏無垢無淨無缺無圓靈光皓皓杲日正當天知見度眾生眾生亦復盲如來非法相方到涅槃城知見不生分第三十一入經若著見聞覺知不解如來妙義悟無我人壽命還同陽焰空花楞嚴云知見立知即無明本知見無見斯即涅槃祇如法相不生時還信解麼大千沙界海中漚一切聖賢如電拂法空非我道非親樹倒籐枯笑轉新風掃止啼黃葉盡千林全體露天真朝日忙忙暮日忙眾生何不早思量人如春夢終須短命若風燈豈長久淨土緣生稱本懷一靈更不墮胞胎法身解脫俱齊等瞥地回頭歸去來應化非真如露如電有為法不牢堅住相布施果報人天持經四句入聖超凡頻頻轉念金剛體最堅演說四句偈六度以為初縱橫無罣礙般若自如如應化非真分第三十二入經施七寶滿僧祇福有求而即妄持此經演四句德雖勝而非真宴坐水月道場成就空花佛事度幻化之含識證寂滅之菩提凡情聖解俱空生死涅槃如夢昔梁武帝請傅大士講經大士揮案一聲便乃下座如斯洪範千古分明不悋弘慈當機辨著噫大士揮尺講經猶是曲垂方便美則甚美了則未了若論最上頓宗直是不通凡聖以金剛王寶劍盡情掃蕩無餘一任渠明來暗來四方八面來普教他休去歇去一念萬年去然雖如是且道末後一句誰堪奉行直得虛空悉消殞天龍八部遍流通空生疊疊窮迷妄大覺重重說偈言末後了然超百億明如杲日耀乾坤直截根源說與君了無些子涉情塵奈何蹉過西來意猶道休境景示人極樂家鄉甚妙哉無諸憂苦樂常諧因談果海圓音徹時禮金容歸去來金剛般若六度根源內外最牢堅三千大千萬古流傳雙林默語祖祖重宣開示悟入眾生大有緣說破無生話決定往西方彌陀極樂國常聞般若香佛說是經已入經觀之為言內心覺照其在般若心經則首云觀自在菩薩行深般若波羅蜜多時照見五蘊皆空在此經則終以如是觀如發菩提心者印證諸法空義學者勿以肉眼觀之而會之則為親參黃面矣凡諸聞者莫不頓然開悟無量歡喜信而受之奉而行之且道信受奉行個甚麼觸目對揚真般若山河全露法王身五千來字妙難量八百餘家解漫詳珍重諸人休外覓回光直下自承當鬼神稽首聽經聲妙悟圓通萬法明從此諸人如會得這回更不問前程人身得處最為難莫把浮生過等閒須藉金剛三昧力直教打破死生關三十二分分分全真言下好惺惺四流浪息六國安寧朝看暮轉拔楔抽釘春雷震響推倒望舟亭見色非干色聞聲不是聲色聲不礙處親到法王城般若無盡藏真言至普迴向真言云云今同善眾共閱最上乘經慶幸今宵佛事時當滿散普集良因莊嚴會首之福田成就無窮之善果此事且止試問諸人這一場公案作麼施行還會得麼拈起則佛覷不破展開則法界難藏若能直下承當管取本來具足雖然如是猶涉途程且道即今兩手分付又作麼生道言言見諦言非有句句超宗句本無金剛本體湛然虛把斷牢關一物無若要山僧通線路諸人收取護身符閻王本是平等君不愛民財祇取人陰司若用錢打當貧者先亡富者存西方極樂景幽深寶網光騰百萬尋菩薩為鄰談妙旨聲聞作伴演圓音良緣眾等略聽些個般若大摩訶行住坐臥不離這個人人本具非我非他諸人薦取今生莫蹉過摩訶空最大最大是摩訶般若波羅蜜撒手見彌陀摩訶般若波羅蜜多心經入經云云夫欲了最上大乘須具金剛正眼看釋迦老與須菩提顯大機施大用聚須彌山王等七寶碎大千沙界若微塵盡僧祇劫布施將來獨最上乘無法可得直得人天膽喪魔外心寒俱能捨命承當依舊白雲萬里所以解此經者八百餘家頌此經者不滿屈指蓋古人錯答一字尚墮野狐謬誦此經應入地獄宗鏡自惟不入地獄何由拯濟群生既能為法忘軀豈避彌天逆罪橫按寶劍重說偈言摧涅槃心滅正法眼掃除知見截斷命根堪報不報之恩用酬難酬之德眼前雨洗千山翠腳下蓮花一樣生四十九年成露布五千餘卷盡言詮妙明一句威音外折角泥牛雪裏眠阿彌陀佛色光輝白毫宛轉五須彌頂上旋螺青絲髮三十二種相巍巍銷唱金經滿散緣回施今辰福無邊合會眾等齊修證見聞薰種已周圓道場圓滿不可思議人人用心機銷唱金經佛聖遍知上祝皇帝聖壽萬歲法界有情同生極樂國道場圓滿佛回程幢幡寶蓋空裏迎腳踏金蓮千萬朵空中音樂響鈴鈴南無一乘宗無量義真空妙有金剛般若經伏願經聲琅琅上徹穹蒼梵語玲玲下通幽府一願刀山落刃二願劍樹鋒摧三願爐炭收焰四願江河浪息鍼喉餓鬼永絕饑虛鱗甲羽毛莫相食啖惡星變怪掃出天門異獸靈魑潛藏地穴囚徒禁繫願降天恩疾病纏身早逢良藥盲者聾者願見願聞跛者啞者能行能語懷孕婦人子母團圓征客遠行早還家國貧窮下賤惡業眾生誤殺故傷一切冤尤並皆銷釋金剛威力洗滌身心般若威光照臨寶座舉足下足皆是佛地更願七祖先亡離苦生天地獄罪苦悉皆解脫以此不盡功德上報四恩下資三有法界有情齊登正覺川老頌云如饑得食渴得漿病得瘥熱得涼貧人得寶嬰兒見娘飄舟到岸孤客還鄉旱逢甘澤國有忠良四夷拱手八表來降頭頭總是物物全彰古今凡聖地獄天堂東西南北不用思量剎塵沙界諸群品盡入金剛大道場三塗永息常時苦六趣休隨汩沒因恒沙含識悟真如一切有情登彼岸乃至虛空世界盡眾生及業煩惱盡如是四法廣無邊願今迴向亦如是十方三世一切佛諸尊菩薩摩訶莎聲聞羅漢賢聖僧摩訶般若波羅蜜願以此功德普及於一切誦經保平安消災增福壽三壇登事六度齊修無漏果因共成佛道錄文完
