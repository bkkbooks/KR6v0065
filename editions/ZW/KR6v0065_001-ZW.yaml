body:
  text: 隆興府百福院宗鏡禪師述眾等皈依金剛堅固力漢朝感夢白馬西來意摩騰化時鳩摩羅什譯秦宗奧典佛日照昏衢法身無相不時掛心懷得見如來文殊在五台給孤長者祇園布黃金說法化導果證紫金身般若海會佛菩薩大眾志誠心同歎開科偈說經教主大法王法身不壞號金剛巍巍相好真三昧灼灼祥光照十方不長不短功莫測無去無來德難量自從西域傳心印超越前三與後三般若海會佛菩薩歎佛宣疏摩訶空最大最大是摩訶般若波羅蜜撒手見彌陀茲有開科疏文謹當宣讀報答親恩甚奇哉本來心地豁然開旃檀牛首無價寶儘是能仁花裏來化納白馬馱來一卷經一番拈起一番新蒙師已問經題目試誦金剛一卷經蓋聞漢朝感夢白馬西來摩騰彰漢化之初時羅什感秦宗之代典明明佛日照破昏衢朗朗慧燈至今不滅教之興也其在斯焉末法之代至於今日恭白十方賢聖現坐道場本師釋迦牟尼佛文殊普賢二大菩薩滿空聖眾一切神祇有天眼者天眼遙觀有天耳者天耳遙聞他心宿住聖心玄鑒慈愍故悲愍故大慈悲愍故信禮常住三寶歸命十方一切佛歸命十方一切法法輪常轉度眾生歸命十方一切僧夫金剛般若能開解脫之門玉偈波羅善入菩提之路行行而非空非有句句而無去無來金剛經說三十二分分分而功德難量須菩提聞四句妙偈偈偈而殊因莫測書寫讀誦當生華藏之天為人演說定達涅槃之路般若乃菩提佛母信心即功德道源長養聖胎出生妙法大抵看經通義問道窮源啟淨信心具擇法眼分句讀貫通之理明問酬辯論之文心心無間理全彰念念不忘文自現或問酬深妙而句義玄微詳究元因略陳數段庶一問一答其文明若日星重辯重徵其義曉如白黑義隨文而文隨義左右逢源珠走盤而盤走珠縱橫無礙信解受持者洞明真性見聞隨喜者咸悟菩提流通天上人間普遍微塵剎海太虛無際法施何窮以斯般若功勛總報四恩三有觀夫空如來藏碎祖師關獨露真常無非般若三心不動六喻全彰七寶校功四句倍勝若乃循行數墨轉益見知宗眼不明非為究竟嗚呼微宣奧旨石火電光密顯真機銀山鐵壁瞥生異見滯在中途進步無門退身迷路聊通一線俯為初機良馬見鞭追風千里矣阿彌陀佛法中王祇在西方極樂邦演說金剛經一卷普天匝地放毫光阿彌陀如來毫光接引切以幻身不久浮世非堅不久則形軀變異非堅則火宅無安由是輪迴六趣幾時休遷轉四生何日盡若不念佛求出離畢竟無由得解脫豈不忙然省悟火急修持盡報為期誓生安養高超三界證真空迥出四流無苦趣釋迦文佛大奇哉居士龐公棄家財真武不統王宮位雪山迎請世尊來釋迦如來證盟功德詳夫百年光景全在剎那四大幻身豈能長久每日塵勞汩汩終朝業識茫茫不知一性之圓明徒逞六根之貪慾功名蓋世無非大夢一場富貴驚人難免無常二字爭人爭我到底成空誇會誇能畢竟非實風火散時無老少溪山磨盡幾英雄綠鬢未幾而白髮早侵賀者纔臨而弔者隨至一包膿血長年苦戀恩情七尺髑髏恣意慳貪財寶出息難期入息今朝不保來朝愛河出沒幾時休火宅憂煎何日了不願出離業網祇言未有工夫閻羅王忽地來追崔相公豈容展限回首家親都不見到頭業報自家當鬼王獄卒一任欺凌劍樹刀山更無推抵或攝沃焦石下或在鐵圍山間受鑊湯則萬死千生遭銼磕則一刀兩斷饑吞熱鐵渴飲熔銅十二時甘受苦辛五百劫不見頭影受足罪業復入輪迴頓失舊時人身換卻這迴皮袋披毛戴角銜鐵負鞍以肉供人用命還債生被刀砧之苦死遭湯火之災互積冤愆遞相食啖那時追悔學道無因何如直下承當莫待今生蹉過釋迦文佛捨皇宮而直往雪山居士龐公將家財而悉沉滄海真武不統王位惟務修行呂公既作神仙尚勤參請蘇學士常親佛印韓文公終禮大顛裴公奪笏於石霜房相問法於國一妙善不招駙馬成佛無疑六祖相遇客人聽經頓悟禪道若無況味聖賢何肯皈依華林感二虎隨身投子有三鴉報曉李長者解經而天廚送食須菩提打坐而帝釋散花達摩隻履西歸普化搖鈴騰去羅漢來參於仰山和尚嶽帝受戒于思大禪師徑山至今猶是龍王打供雪峰往昔能使木人開山此皆已驗之因由切莫自生於退屈野狐尚聽百丈法螺螄猶護金剛經十千游魚聞佛號化為天子五百蝙蝠聽法音總作聖賢蟒聞懺以生天龍聽法而悟道彼物尚能頓悟況人何不回心或有埋頭喫飯而空過一生或有錯路修行而不省這意豈識菩提覺性個個圓成爭知般若善根人人具足莫問大隱小隱休別在家出家不拘僧俗而祇要辨心本無男女而何須著相未明人妄分三教了得底同悟一心若能返照迴光皆得見性成佛又況人身易失佛法難逢欲超六道之周流惟有一乘之徑捷需求正見莫信邪師悟了方是入頭行得始能脫俗步步踏著實地頭頭頂掛虛空用時則萬境全彰放下則一塵不立超生死不相關之地了鬼神覷不破之機是凡是聖而同個路頭或冤或親而共一鼻孔如斯實悟尚滯半途休沉向上三玄要了末後一著且道即今喚那個做末後一著青山低處見天闊紅藕開時聞水香棄卻瓢囊擊碎琴如今不戀汞中金自從一見黃龍後始覺從前錯用心始知生死事無常莫道先從老者亡大限到來無定準後生年少也提防富貴貧窮各有由宿緣分定莫剛求不曾下得春時種空守荒田望有秋修唎修唎摩訶修唎普供養我牟尼將欲誦經先安土地金剛菩薩擁護壇儀云何梵畢發願謹受持一相元無垢體性離塵緣專心持四句且要誦真言金剛經啟請若有人受持金剛經者先須至心念淨口業真言然後啟請八金剛四菩薩名號所在之處常當擁護淨口業真言修唎修唎摩訶修唎修修唎薩婆訶安土地真言南無三滿哆母馱喃唵度嚕度嚕地尾薩婆訶虛空藏菩薩普供養真言唵誐誐曩三婆嚩韈日囉斛恭聞法身無相非相可觀至理絕言非言所及蓋以因興四願果滿三身酬願現身彰言化物我釋迦聖主利物情深愍娑婆流浪之鄉贊嚴土常樂之界國名極樂佛號彌陀四十八願弘深百萬行門廣大雙明真化應接高低地前地上皆生是聖是凡俱往彌陀緣願於是彰焉淨土真詮由斯顯矣經來自久久缺宣傳奉報佛恩當明經旨透關妙達如來境及第高登本分鄉佛在靈山莫遠求靈山祇在汝心頭人人有個靈山塔好去靈山塔下修外道天魔皆拱手梵王帝釋為呈祥願今合會諸男女同證金剛大道場早起忙忙直到昏不愁生死祇愁貧饒君使盡千條計直至無常不稱心般若大教六百餘卷佛如來金口宣六朝翻譯東土流傳頻頻持誦四句真詮無為福勝果報利人天稽首三界主大孝釋迦尊累劫報親恩積因成正覺奉請八金剛至四菩薩此經乃大乘教菩薩摩訶薩人之所修般若為六波羅蜜之最勝者也所以名為般若波羅蜜故下經云如來為發大乘者說為發最上乘者說以此佛說大般若經有六百卷凡一十六會此經乃第五百七十七卷給孤獨園第二處第九會說也所以道昔日如來金口演至今拈起又重新此經佛說數千年無量人天得受傳憶得古人曾解道更須會取未聞前人間陽壽真難得一寸光陰一寸金莫待老來方學道孤墳儘是少年人在家菩薩智非常鬧市叢中作道場心地若能無罣礙高山平地總西方金剛般若體如如翠竹黃花滿路途八百餘家呈妙手大家依樣畫葫蘆金剛般若人人本具割斷智為初白雲散處一輪顯露影落千江無來無去諸人薦取凡聖一同居摩訶大法王無短亦無長本來非皂白隨處現青黃發願文開經偈云何梵金剛般若波羅蜜經宗鏡云祇這一卷經六道含靈一切性中皆悉具足蓋為受身之後妄為六根六塵埋沒此一段靈光終日冥冥不知不覺故我佛生慈悲心願救一切眾生齊超苦海共證菩提所以在捨衛國為說是經大意祇是為人解粘去縛直下明瞭自性免逐輪迴不為六根六塵所惑若人具上根上智不撥自轉是胸中自有此經且將置三十二分於空間無用之地亦不是過如或未然且聽山野與汝打葛籐去也夫金剛經者自性堅固萬劫不壞況金性堅剛也般若者智慧也波羅蜜者登彼岸義也見性得度即登彼岸未得度者即是此岸經者徑也我佛若不開個徑路後代兒孫又向甚麼處進步且道這一步又如何進看取下文提綱此經深旨無相為宗顯妄明真提綱要旨劍鋒微露掃萬法之本空心花發明照五蘊之非有直得雲收雨霽海湛空澄快登般若慈舟直到菩提彼岸且道心花發明在甚麼處太湖三萬六千傾月在波心說向誰法王權實令雙行電捲風馳海嶽傾霹靂一聲雲散盡到家元不涉途程西方淨土人人有不假修持已現前諸上善人如見性阿彌陀佛便同肩無始無明幻色迷夢魂生死幾千迴一條直路超三界但念彌陀歸去來法會因由教起根源如是法我佛宣舍衛國中乞食為先次第乞已本處安然結跏趺坐終日默無言金剛般若智個個體如然白雲消散盡明月一輪圓法會因由分第一入金剛經調御師親臨舍衛威動乾坤阿羅漢雲集祇園輝騰日月入城持鉢良由悲愍貧窮洗足收衣正是宴安時節若向世尊未舉已前薦得猶且不堪開口已後承當自救不了宗鏡急為提撕早遲八刻何故良馬已隨鞭影去阿難依舊世尊前乞食歸來會給孤收衣敷坐正安居真慈洪範超三界調御人天得自如西方寶號能宣演九品蓮台必往生直下相逢休外覓何勞十萬八千程百歲光陰瞬息迴其身畢竟化為灰誰人肯向生前悟悟取無生歸去來善現啟請頓起疑心合掌問世尊云何應住降伏其心佛教如是仔細分明冰消此岸無花休怨春金剛般若智莫向外邊求空生來請問教起有因由善現啟請分第二入經昔奇哉之善現讚希有之慈尊悲憐濁世眾生咨決菩提心要可謂一經正眼三藏絕詮千聖不傳諸祖不說如是降伏扁舟已過洞庭湖護念叮嚀何啻白雲千萬里為甚麼如此毗婆屍佛早留心直至而今不得妙問處孤高答處深妙圓真淨不須尋瞥然如是知端的默契菩提大道心阿彌陀佛元無相遍界明明不覆藏文潞尚然修淨土東坡猶願往西方纔出胞胎又入胎聖人觀此慟悲哀幻身究竟無香潔打破畫瓶歸去來大乘正宗指示叮嚀空生意分明如是應住降伏其心四生六道無我無人誰歸滅度拈來卻在心獨坐寂寥寥平地起波濤風來波浪起水漲見船高大乘正宗分第三入經涅槃清淨盡令含識皈依四相俱忘實無眾生滅度如斯了悟便能脫死超生其或未然依舊迷封滯殼會麼生死涅槃本平等妄心盡處即菩提頂門具眼辨來端眾類何曾入涅槃絕後再甦無一物了知生死不相干七重寶樹人人有九品蓮花處處開不涉一程親見佛圓音時聽悟心懷擲卻閻浮似草鞋更無一物可開懷靈明一點輝千古超日月光歸去來妙行無住日月分明本體離根塵四維上下朗耀無窮世尊指教一一分明空生信受鶯來處處春摩訶般若宗性相體皆同四生並六道盡在默然中妙行無住分第四入經住相佈施猶日月之有窮不著六塵若虛空之無際自他俱利福德難量豁然運用靈通廓爾縱橫自在且道還有住著處麼妙體本來無處所通身何更有蹤由運心檀度契真常福等虛空不可量無影樹頭花爛熳從他採獻法中王步步頭頭皆是道彌陀元不住西方法身遍滿三千界化佛權為十二光道過邙山古墓排淮陰功業事堪哀貧富貴賤皆如夢夢覺來時歸去來如理實見分明說破空生意如何地水火風四大和合雲來雲去本更無他漚生漚滅元非一與多如如真妙理湛湛自然觀圓明真實見隨處得安然如理實見分第五入經金身顯煥巍巍海上孤峰妙相莊嚴皎皎星中圓月雖然如是畢竟非真經云真非真恐迷我常不開演且道意在於何一月普現一切水一切水月一月攝報化非真了妄緣法身清淨廣無邊千江有水千江月萬里無雲萬里天人命無常呼吸間眼觀紅日落西山寶山歷盡空迴首一失人身萬劫難稽首彌陀真聖主身乘七寶紫金台四十八願常無間攝受眾生歸去來正信希有一念無差心內外休取法心若取法凡聖皆差心若無念卻被雲霞圓明一點春來樹樹花邪心俱蕩盡正信勿生疑念念無差別處處發真機正信希有分第六入經因勝果勝信心明瞭無疑人空法空真性本來平等直饒名相雙泯取捨兩忘要且猶存筏見咦彈指已超生死海何須更覓度人舟善根成熟信無疑取相求玄轉背馳一念頓超空劫外元來不許老胡知頻伽尚能知皈向孔雀猶聞得化生時節因緣休蹉過樓頭畫鼓恰初更勢至觀音悲滿懷寶瓶楊柳灑三災誓隨淨土彌陀主接引眾生歸去來無得無說誰為安名空生意分明如來所說無始無終雲生晚谷月照長空千法萬法皆從一法生取捨皆難得無心體自然本來常寂寂無說亦無傳無得無說分第七入經得亦非說亦非能仁機輪電掣取不可捨不可空生舌本瀾翻且道無為法為甚麼有差別萬古碧潭空界月再三撈漉始應知雲捲秋空月印潭寒光無際與誰談豁開透地通天眼大道分明不用參西方勝境無明暗不比人間夜半深五鼓分明當子位一輪正滿對天心休插龍釵與鳳釵莫將胭粉污唇腮法身清淨元無垢體露堂堂歸去來依法出生法法皆真元從一法生四生六道情與無情山河大地體露分明泥牛吸水黃河徹底清山河如掌平無壞亦無成千差與萬別金剛界內生依法出生分第八入經寶滿三千財施有盡偈宣四句法施無窮發生智慧光明流出真如妙道所以稱揚德勝了達性空徹諸佛之本源豁一經之眼目還見四句親切處麼真性洞明依般若不勞彈指證菩提徒將七寶施三千四句親聞了上根無量劫來諸佛祖從茲超出涅槃門慧燈不滅魔難入智鏡常明夢不侵堪歎浮生瞌睡漢從他萬劫恣昏沉頭髮焦然乾竹釵兩肩擔水又擔柴一生貧賤多辛苦厭惡女生歸去來一相無相本自如然不在口宣傳五果四向誰後誰先絲毫不掛萬法周圓圓明彌滿無心照大千五果並四向本體元無相兩目不相似鼻孔都一樣一相無相分第九入經人天往返諸漏未除道果雙忘無諍第一超凡入聖從頭勘證將來轉位回機透底盡令徹去還委悉麼勿謂無心云是道無心猶隔一重關果位聲聞獨善身寂然常定本非真回心頓入如來海倒駕慈航逆渡人樓頭畫鼓五更闌爭奈眾生被眼瞞不見性天光燦燦但於夜後黑漫漫極樂國中真快樂永無八難及三災常聞天樂空中響敢勸西方歸去來莊嚴淨土錦上添花徒勞任算沙燃燈昔日授記無差因風吹火末後拈花誰人會得迦葉便笑他莊嚴生淨土金粟眼中沙初生全洩漏末後又拈花莊嚴淨土分第十入經如來續焰燃燈實無可得之法菩薩莊嚴佛土應無所住之心諸妄消亡一真清淨昔究法華妙旨親感普賢誨言清淨身心安居求實冥符奧義豁悟前因直得心法兩忘根塵俱泯且道莊嚴個什麼彈指圓成八萬門剎那滅卻三祇劫正法眼中無所得涅槃心外謾莊嚴六塵空寂無人會推倒須彌浸玉蟾百歲光陰一剎那凌晨淨口念彌陀看經讀誦無休歇必免當來過奈河造論弘經大辯才馬鳴龍樹及天台圭峰乃至清涼老總勸西方歸去來無為福勝四句堪誇如塵比數沙住相佈施凡聖皆差無來無去月照簾下無根樹子常開四季花四句絕堪誇河沙數漸多算來無一法淨處娑婆訶無為福勝分第十一入經滿積恒沙七寶周回佈施三千福德分明因果不昧能宣四句之偈勝前萬倍之功用真智以照愚如急流而勇退且道退後如何象踏恒沙徹底過大千沙界百雜碎重增七寶滿恒沙如棄甜桃覓苦瓜豁悟真空元不壞百千三昧總虛花百歲光陰燃指間奔馳不定片時閑煩君點檢形骸看多少英雄去不還勢至悲光絕點埃塵塵剎剎現如來真心量與觀音等接引眾生歸去來尊重正教誰敢輕慢塔廟在身邊人人本有個個皆然金剛寶藏體自周圓若還信受拈來自檢看起坐皆尊重常親塔廟前如如元不動處處得安然尊重正教分第十二入經云云慈愍三根隨說乃人天敬仰受持四句皆應如塔廟尊崇常行無念之心實為希有之法如何是最上第一句非但我今獨達了恒沙諸佛體皆同說處隨宜不滯空勸持四句為流通天龍覆護尊如塔功德無邊贊莫窮百歲光陰老盡人青山綠水至如今開眸認取來生路莫學愚頑錯用心念佛臨終見寶台寶幡寶蓋滿空排彌陀勢至觀音等合掌相隨歸去來如法受持誰敢謾他須菩提於意如何我今為汝一一言破白雲散處月照禪河文殊不遠休巡山禮土坡如法謹受持福勝等須彌白雲消散盡明月始光輝如法受持分第十三入經大覺尊本來不立一字而直指人心須菩提無端特請標名而強生枝節縱使析微塵如世界無相可求施身命等河沙無法可說且道奉行個什麼金剛寶劍倚天寒外道邪魔俱腦裂個裏本無元字腳空中誰敢強安名等閒點出金剛眼照破魔王八萬城百歲光陰不自驚老來何物作前程祇憑經卷三千藏莫把虛華過一生般若現前無罣礙橫身宇宙莫疑猜虛空拶破難藏覆大道分明歸去來離相寂滅誰為分別有口也難說五百世中割截支節而無一念妄生虛說成道證果雲散家家月離相即非說古今常寂滅而無一念心任汝分支節離相寂滅分第十四入經空生聞說是經解義趣而悲流兩淚仙人垂慈弘忍笑雪刃而謾斬虛空如是印可其詞能離一切諸相未